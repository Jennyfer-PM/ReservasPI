<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar espacios - Reservas UPQ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header"><h3>Reservas UPQ</h3><p>Universidad Politécnica</p></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">🏠 Inicio</a>
                <a href="espacios.html" class="active">📍 Espacios</a>
                <a href="solicitudes.html">📋 Mis solicitudes</a>
                <a href="admin.html" id="adminLink" style="display: none;">⚙️ Administración</a>
                <a href="perfil.html">👤 Mi perfil</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title"><h2>Explorar espacios</h2><p>Encuentra el espacio perfecto</p></div>
                <div class="user-menu"><div class="user-avatar" id="userAvatar">U</div><span class="user-name" id="userName">Usuario</span><button class="btn-logout" id="logoutBtn">Cerrar sesión</button></div>
            </div>
            <div class="content">
                <div class="search-box"><input type="text" id="search" placeholder="Buscar espacios..." class="form-control"></div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="todos">Todos</button>
                    <button class="filter-btn" data-filter="Laboratorio">Laboratorios</button>
                    <button class="filter-btn" data-filter="Auditorio">Auditorios</button>
                    <button class="filter-btn" data-filter="Sala">Salas</button>
                    <button class="filter-btn" data-filter="Taller">Talleres</button>
                    <button class="filter-btn" data-filter="Biblioteca">Biblioteca</button>
                </div>
                <div class="espacios-grid" id="espaciosGrid">Cargando...</div>
            </div>
        </main>
    </div>
    <script src="js/espacios.js"></script>
    <!-- Modal para solicitar espacio -->
<div id="modalSolicitar" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px;">
        <h3>Solicitar espacio</h3>
        <input type="hidden" id="espacioId">
        <div class="form-group">
            <label>Nombre del evento</label>
            <input type="text" id="nombreEvento" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="fecha" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Hora de inicio</label>
            <input type="time" id="hora" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Duración (horas)</label>
            <input type="number" id="duracion" class="form-control" min="1" max="8" value="2" required>
        </div>
        <div class="form-group">
            <label>Número de asistentes</label>
            <input type="number" id="asistentes" class="form-control" min="1" required>
        </div>
        <div class="form-group">
            <label>Detalles adicionales</label>
            <textarea id="detalles" class="form-control" rows="3"></textarea>
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="enviarSolicitud()">Enviar solicitud</button>
        </div>
    </div>
</div>
</body>
</html>
